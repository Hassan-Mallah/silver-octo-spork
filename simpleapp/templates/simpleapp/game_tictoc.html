<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tic-Toc</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'simpleapp/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'simpleapp/tictoc/style.css' %}">
  </head>
  <body>
    {% include 'simpleapp/header.html' %}
    <h1>Tic-Toc</h1>

    <div class="game-tictoc-wrap">
      <div id="tic-grid" class="grid"></div>
      <div id="tic-status">Click Start to begin</div>
      <div class="ui">
        <button id="start-tic">Start</button>
        <button id="restart-tic">Restart</button>
      </div>
    </div>

    <div id="overlay-tic" class="hidden">Game Over<br><span id="tic-winner"></span><br><button id="overlay-tic-restart">Play Again</button></div>

    <div id="choose-overlay" class="hidden">
      <div class="choose-box">
        <div class="choose-text">Choose symbol</div>
        <div class="choose-buttons">
          <button id="choose-x">X</button>
          <button id="choose-o">O</button>
          <button id="choose-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <script src="{% static 'simpleapp/tictoc/game.js' %}"></script>
  </body>
</html>
