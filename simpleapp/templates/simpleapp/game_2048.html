<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2048</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'simpleapp/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'simpleapp/2048/style.css' %}">
  </head>
  <body>
    <h1>2048</h1>

    <div class="game-2048-wrap">
      <div id="grid" class="grid"></div>
      <div class="ui">
        <button id="start-2048">Start</button>
        <button id="restart-2048">Restart</button>
      </div>
    </div>

    <div id="overlay-2048" class="hidden">Game Over<br><button id="overlay-2048-restart">Play Again</button></div>

    <script src="{% static 'simpleapp/2048/game.js' %}"></script>
  </body>
</html>
