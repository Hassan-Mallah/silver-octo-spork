<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple Django App</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'simpleapp/snake/style.css' %}">
  </head>
  <body>
    <h1>Welcome to simpleapp</h1>
    <p>This is a minimal Django app scaffolded inside the workspace.</p>

    <div class="snake-wrap">
      <canvas id="snake-game" width="400" height="400"></canvas>
      <div class="ui">
        <div id="snake-score">Score: 0</div>
        <button id="snake-restart">Restart</button>
      </div>
      <div id="snake-overlay" class="hidden">Game Over<br><button id="snake-overlay-restart">Play Again</button></div>
    </div>

    <script src="{% static 'simpleapp/snake/game.js' %}"></script>
  </body>
</html>
